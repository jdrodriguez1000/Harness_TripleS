[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "soda"
version = "0.1.0"
description = "Software Development Agentic — arnés de IA que orquesta agentes mediante CLIs de suscripción"
readme = "idea.md"
requires-python = ">=3.12"
authors = [{ name = "jdrodriguez1000" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6"]

# [project.scripts]
# El entry point `soda` se habilita cuando exista el módulo CLI (paso posterior).
# soda = "soda.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/soda"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 96
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
